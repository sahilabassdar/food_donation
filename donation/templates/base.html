<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Food Project{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

    <a class="navbar-brand fw-bold" href="/">FoodWaste</a>

    <div class="ms-auto">

        <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>

        {% if user.is_authenticated %}
            <span class="text-white me-2">Hello, {{ user.username }}</span>
            <a class="btn btn-danger btn-sm" href="/logout/">Logout</a>
        {% else %}
            <a class="btn btn-outline-light btn-sm me-2" href="/login/">Login</a>
            <a class="btn btn-success btn-sm" href="/signup/">Signup</a>
        {% endif %}

    </div>

</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
